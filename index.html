<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐄 MoomooMath</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --primary: #5C9E31;
  --accent:  #F4A528;
  --correct: #4CAF50;
  --wrong:   #E53935;
  --sky1: #4FC3F7; --sky2: #B3E5FC;
  --ground1: #7CB342; --ground2: #33691E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  background: var(--sky1);
}

/* ── SKY ── */
.sky {
  flex: 1;
  min-height: 64vh;
  background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 16px 16px;
  gap: 12px;
}

/* logo */
.logo {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  font-size: 1.55em;
  font-weight: bold;
  color: white;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.25);
  white-space: nowrap;
  letter-spacing: 1px;
}

/* top bar */
.topbar {
  position: absolute;
  top: 12px; left: 14px; right: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 30;
}
.page-label {
  background: rgba(0,0,0,0.15);
  color: white; font-weight: bold;
  padding: 5px 12px; border-radius: 20px;
  font-size: .9em;
}
.diff-group { display: flex; gap: 6px; }
.diff-btn {
  font-family: inherit; font-size: .8em;
  padding: 5px 12px;
  border: 2px solid rgba(255,255,255,.8);
  border-radius: 20px;
  background: rgba(255,255,255,.2);
  color: white; cursor: pointer; font-weight: bold;
  transition: all .18s;
}
.diff-btn.active { background: white; color: var(--primary); }
.diff-btn:hover  { background: rgba(255,255,255,.45); }

/* clouds */
.cloud {
  position: absolute;
  background: white; border-radius: 50px; opacity: .82;
  pointer-events: none;
}
.cloud::before,.cloud::after {
  content:''; position:absolute;
  background:white; border-radius:50%;
}
.c1 { width:100px;height:34px;top:14%;left:6%;  animation:cf 7s ease-in-out infinite; }
.c1::before{width:50px;height:50px;top:-26px;left:14px;}
.c1::after {width:36px;height:36px;top:-17px;right:11px;}
.c2 { width:140px;height:46px;top:22%;right:7%; animation:cf 9s ease-in-out infinite 2s; }
.c2::before{width:68px;height:68px;top:-36px;left:20px;}
.c2::after {width:48px;height:48px;top:-22px;right:16px;}
.c3 { width:80px;height:27px;top:9%;left:36%;  animation:cf 8s ease-in-out infinite 1s; }
.c3::before{width:40px;height:40px;top:-20px;left:12px;}
.c3::after {width:30px;height:30px;top:-13px;right:8px;}
@keyframes cf {
  0%,100%{transform:translateX(0) translateY(0);}
  33%{transform:translateX(7px) translateY(-5px);}
  66%{transform:translateX(-4px) translateY(3px);}
}

/* ── STORY PANEL ── */
.story-panel {
  background: rgba(255,255,255,.92);
  border-radius: 18px;
  padding: 14px 20px;
  max-width: 500px; width: 100%;
  box-shadow: 0 6px 20px rgba(0,0,0,.12);
  z-index: 10;
  text-align: center;
  border-left: 5px solid var(--accent);
}
.story-scene {
  font-size: .95em; font-weight: bold;
  color: var(--accent); margin-bottom: 5px;
}
.story-text {
  font-size: 1em; color: #444;
  line-height: 1.5;
}

/* ── QUESTION CARD ── */
.card {
  background: rgba(255,255,255,.97);
  border-radius: 24px;
  padding: 22px 34px 18px;
  box-shadow: 0 16px 44px rgba(0,0,0,.16), 0 0 0 4px rgba(255,255,255,.4);
  text-align: center;
  max-width: 500px; width: 100%;
  z-index: 10;
}
.card-question { font-size: .95em; color: #666; margin-bottom: 6px; }

/* dots */
.dots { display:flex; justify-content:center; gap:7px; margin-bottom:14px; flex-wrap:wrap; }
.dot {
  width:20px;height:20px; border-radius:50%;
  background:#E0E0E0;
  transition: all .3s;
}
.dot.done    { background: var(--correct); }
.dot.current { background: var(--primary); transform:scale(1.25); box-shadow:0 0 0 3px rgba(92,158,49,.3); }

/* question text */
.qtext {
  font-size: 2.7em; font-weight: bold;
  color: #222; letter-spacing: 3px;
  margin: 8px 0 14px;
  min-height: 1.15em;
}

/* answer row */
.ans-row { display:flex; align-items:center; justify-content:center; gap:10px; }
.ans-input {
  font-family: inherit; font-size: 2em; font-weight: bold;
  width: 120px; text-align: center;
  border: 3px solid #CFD8DC; border-radius: 12px;
  padding: 7px 10px; outline: none; color: #333;
  -moz-appearance: textfield;
  transition: border-color .2s, background .2s;
}
.ans-input::-webkit-inner-spin-button,
.ans-input::-webkit-outer-spin-button { -webkit-appearance:none; }
.ans-input:focus       { border-color: var(--primary); }
.ans-input.flash-ok    { border-color: var(--correct); background: #F1F8E9; }
.ans-input.flash-bad   { border-color: var(--wrong); background: #FFF3F3; animation: shakeEl .4s ease; }

.go-btn {
  font-family: inherit; font-size:1.5em;
  padding: 9px 20px;
  background: linear-gradient(135deg, #5C9E31, #388E3C);
  color: white; border: none; border-radius: 12px;
  cursor: pointer; font-weight: bold;
  box-shadow: 0 4px 12px rgba(56,142,60,.4);
  transition: transform .1s;
}
.go-btn:hover  { transform: translateY(-2px); }
.go-btn:active { transform: translateY(1px); }

/* feedback */
.feedback {
  min-height: 1.6em; font-size: 1.2em;
  font-weight: bold; margin-top: 10px;
}
.feedback.ok  { color: var(--correct); }
.feedback.bad { color: var(--wrong); }

/* ── SOLUTION PANEL ── */
.solution {
  display: none;
  background: #FFF8E1;
  border: 2px solid var(--accent);
  border-radius: 14px;
  padding: 14px 18px;
  margin-top: 12px;
  text-align: left;
}
.solution.show { display: block; }
.solution-title {
  font-size: 1.05em; font-weight: bold;
  color: #E65100; margin-bottom: 8px;
}
.step {
  font-size: .92em; color: #333;
  padding: 4px 0 4px 10px; line-height: 1.5;
  border-left: 3px solid var(--accent);
  margin-bottom: 4px;
  background: rgba(255,255,255,.5);
  border-radius: 0 6px 6px 0;
}
.step-highlight {
  font-size: 1em; font-weight: bold;
  color: var(--primary); text-align: center;
  margin-top: 8px;
  padding: 6px; background: rgba(92,158,49,.1);
  border-radius: 8px;
}

/* mobile numpad */
.numpad { display:none; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:14px; }
.npbtn {
  font-family:inherit; font-size:1.25em; font-weight:bold;
  padding:11px; border:2px solid #E0E0E0;
  border-radius:10px; background:white;
  cursor:pointer; color:#333;
  transition: all .12s;
}
.npbtn:active { transform:scale(.93); background:#F1F8E9; }
.npbtn.np-zero { grid-column: 1/3; }
.npbtn.np-del  { background:#FFF3F3; color:var(--wrong); border-color:#FFCDD2; }
.npbtn.np-ok   { background:var(--primary); color:white; border-color:#388E3C; font-size:.95em; }
@media (max-width:600px),(hover:none) {
  .numpad { display:grid; }
  .ans-input { font-size:1.6em; width:105px; }
}

/* ── GROUND SCENE ── */
.ground {
  height: 36vh;
  background: linear-gradient(180deg, var(--ground1) 0%, var(--ground2) 100%);
  position: relative;
  overflow: hidden;
}
.grass-edge {
  position:absolute; top:0; left:0; right:0; height:26px;
  background: radial-gradient(ellipse 34px 20px at 50% 100%, #AED581 48%, transparent 50%);
  background-size: 34px 20px;
  background-repeat: repeat-x;
  pointer-events:none;
}
.barn { position:absolute; bottom:44px; right:40px; font-size:3em; opacity:.75; pointer-events:none; }
.track {
  position:absolute; bottom:44px;
  left:24px; right:24px; height:14px;
  background: repeating-linear-gradient(90deg,#8D6E63 0,#8D6E63 26px,#A1887F 26px,#A1887F 36px);
  border-radius:7px;
  box-shadow:0 3px 7px rgba(0,0,0,.22);
}
.bush { position:absolute; bottom:57px; font-size:1.5em; pointer-events:none; }
.score-display {
  position:absolute; top:9px; right:12px;
  font-size:1.05em; color:white; font-weight:bold;
  text-shadow:1px 1px 3px rgba(0,0,0,.3);
}

/* COW */
.cow {
  position:absolute; bottom:48px;
  font-size:3.4em; left:3%;
  transition: left 1.1s cubic-bezier(.25,.46,.45,.94);
  z-index:20; line-height:1;
  filter:drop-shadow(3px 5px 5px rgba(0,0,0,.26));
  transform-origin: bottom center;
  user-select: none;
}
.cow.walk  { animation: cowWalk .18s steps(2) infinite; }
.cow.happy { animation: cowHappy .55s ease; }
.cow.sad   { animation: cowSad .42s ease; }
.cow.eating{ animation: cowEat .28s ease infinite; font-size:4.3em; }
@keyframes cowWalk  { 0%{transform:translateY(0);}50%{transform:translateY(-7px);}100%{transform:translateY(0);} }
@keyframes cowHappy { 0%{transform:scale(1) rotate(0) translateY(0);}25%{transform:scale(1.3) rotate(-16deg) translateY(-11px);}55%{transform:scale(1.3) rotate(16deg) translateY(-11px);}80%{transform:scale(1.1) rotate(-4deg) translateY(-4px);}100%{transform:scale(1) rotate(0) translateY(0);} }
@keyframes cowSad   { 0%,100%{transform:translateX(0);}20%{transform:translateX(-8px) rotate(-5deg);}40%{transform:translateX(8px) rotate(5deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);} }
@keyframes cowEat   { 0%{transform:rotate(-20deg) scale(1.1);}50%{transform:rotate(20deg) scale(1.22);}100%{transform:rotate(-20deg) scale(1.1);} }

/* HAY */
.hay {
  position:absolute; bottom:48px; right:28px;
  font-size:2.9em; z-index:20;
  transition: transform .5s, opacity .5s;
  filter:drop-shadow(2px 4px 4px rgba(0,0,0,.26));
  user-select:none;
}
.hay.eaten { transform:scale(0) rotate(360deg); opacity:0; }

/* dust */
.dust { position:absolute; font-size:.85em; opacity:0; animation:dustFly .6s ease forwards; pointer-events:none; z-index:15; }
@keyframes dustFly { 0%{opacity:.7;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-24px) scale(.4);} }

/* ── CELEBRATION ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.cel-card {
  background:white; border-radius:30px;
  padding:36px 48px; text-align:center;
  box-shadow:0 22px 65px rgba(0,0,0,.28);
  animation:popIn .5s cubic-bezier(.68,-.55,.265,1.55);
  max-width:400px; width:90%;
}
@keyframes popIn { 0%{transform:scale(0) rotate(-12deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;} }
.cel-emoji { font-size:5em; animation:celBounce .7s ease infinite; display:block; }
@keyframes celBounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);} }
.cel-title { font-size:1.85em; color:var(--accent); font-weight:bold; margin:10px 0 4px; }
.cel-stars { font-size:1.5em; margin-bottom:7px; }
.cel-desc  { font-size:1em; color:#666; margin-bottom:22px; line-height:1.5; white-space:pre-line; }
.cel-btns  { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.next-btn, .pdf-btn {
  font-family:inherit; font-size:1.15em;
  padding:11px 24px; border:none;
  border-radius:14px; cursor:pointer; font-weight:bold;
  transition:transform .15s;
}
.next-btn { background:linear-gradient(135deg,#5C9E31,#388E3C); color:white; box-shadow:0 5px 18px rgba(56,142,60,.4); }
.pdf-btn  { background:linear-gradient(135deg,#F4A528,#E65100); color:white; box-shadow:0 5px 18px rgba(230,81,0,.4); }
.next-btn:hover,.pdf-btn:hover { transform:scale(1.06); }

/* confetti */
.confetti { position:fixed; border-radius:3px; z-index:200; pointer-events:none; animation:confettiFall linear forwards; }
@keyframes confettiFall { 0%{opacity:1;transform:translateY(-30px) rotate(0);}100%{opacity:.2;transform:translateY(102vh) rotate(800deg);} }

/* star particles */
.star-p { position:fixed; pointer-events:none; z-index:60; animation:starFly .9s ease-out forwards; font-size:1.3em; }
@keyframes starFly { 0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.4);} }

@keyframes shakeEl { 0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-7px);}80%{transform:translateX(7px);} }
</style>
</head>
<body>

<!-- ── SKY ── -->
<div class="sky">
  <div class="c1 cloud"></div><div class="c2 cloud"></div><div class="c3 cloud"></div>

  <div class="topbar">
    <div class="page-label" id="pageLabel">Page 1</div>
    <div class="diff-group">
      <button class="diff-btn" id="d-easy"   onclick="setDiff('easy')">Easy</button>
      <button class="diff-btn active" id="d-medium" onclick="setDiff('medium')">Medium</button>
      <button class="diff-btn" id="d-hard"   onclick="setDiff('hard')">Hard</button>
    </div>
  </div>

  <div class="logo">🐄 MoomooMath</div>

  <!-- Story panel -->
  <div class="story-panel" id="storyPanel">
    <div class="story-scene" id="storyScene">🌳 Welcome to MoomooMath!</div>
    <div class="story-text"  id="storyText">Get ready for a math adventure with MooMoo the cow!</div>
  </div>

  <!-- Question card -->
  <div class="card" id="card">
    <div class="card-question" id="cardQuestion">What is the answer?</div>
    <div class="dots" id="dots"></div>
    <div class="qtext" id="qtext">Loading…</div>
    <div class="ans-row">
      <input type="number" class="ans-input" id="ainput"
             placeholder="?" autocomplete="off"
             onkeydown="onKey(event)">
      <button class="go-btn" onclick="submit()">✓</button>
    </div>
    <div class="feedback" id="fbk"></div>

    <!-- Step-by-step solution (shown after wrong answer) -->
    <div class="solution" id="solution">
      <div class="solution-title">🤔 Let me show you how to solve this!</div>
      <div id="steps-container"></div>
    </div>

    <!-- Numpad (touch devices) -->
    <div class="numpad" id="numpad">
      <button class="npbtn" onclick="np('7')">7</button>
      <button class="npbtn" onclick="np('8')">8</button>
      <button class="npbtn" onclick="np('9')">9</button>
      <button class="npbtn" onclick="np('4')">4</button>
      <button class="npbtn" onclick="np('5')">5</button>
      <button class="npbtn" onclick="np('6')">6</button>
      <button class="npbtn" onclick="np('1')">1</button>
      <button class="npbtn" onclick="np('2')">2</button>
      <button class="npbtn" onclick="np('3')">3</button>
      <button class="npbtn np-zero" onclick="np('0')">0</button>
      <button class="npbtn np-del"  onclick="npdel()">&#9003;</button>
      <button class="npbtn np-ok"   onclick="submit()">&#10003; Go!</button>
    </div>
  </div>
</div>

<!-- ── GROUND SCENE ── -->
<div class="ground">
  <div class="grass-edge"></div>
  <div class="track"></div>
  <div class="barn">&#127978;</div>
  <div class="bush" style="left:16%">&#127807;</div>
  <div class="bush" style="left:44%">&#127803;</div>
  <div class="bush" style="right:22%">&#127807;</div>
  <div class="score-display">&#11088; <span id="scoreNum">0</span></div>
  <div class="cow" id="cow">&#128004;</div>
  <div class="hay" id="hay">&#127806;</div>
</div>

<!-- ── CELEBRATION OVERLAY ── -->
<div class="overlay" id="overlay">
  <div class="cel-card">
    <span class="cel-emoji" id="celEmoji">&#127942;</span>
    <div class="cel-title" id="celTitle">Amazing!</div>
    <div class="cel-stars" id="celStars">&#11088;&#11088;&#11088;&#11088;&#11088;</div>
    <div class="cel-desc"  id="celDesc">MooMoo reached the hay!</div>
    <div class="cel-btns">
      <button class="pdf-btn" onclick="downloadPDF()">&#128196; Get Certificate</button>
      <button class="next-btn" onclick="nextPage()">Next Adventure &#8594;</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const G = {
  diff: 'medium', page: 1, score: 0,
  questions: [], idx: 0,
  attempts: 0, pageWrong: 0,
  pageLog: [],
  busy: false,
};
const TOTAL = 10;

// ═══════════════════════════════════════════════
//  STORY TEMPLATES
// ═══════════════════════════════════════════════
const STORIES = {
  '+': [
    (a,b) => ({ scene:'🍎 Apple Orchard', text:`MooMoo went apple picking! She found ${a} apples on the big tree and ${b} apples on the small tree.`, q:`How many apples did MooMoo collect altogether?` }),
    (a,b) => ({ scene:'🌻 Sunflower Farm', text:`Farmer Billy planted ${a} sunflowers in the morning and ${b} more in the afternoon.`, q:`How many sunflowers did Farmer Billy plant in total?` }),
    (a,b) => ({ scene:'🐸 Pond Discovery', text:`By the pond, MooMoo spotted ${a} frogs on the left bank and ${b} frogs on the right bank.`, q:`How many frogs are there by the pond altogether?` }),
    (a,b) => ({ scene:'🍪 Baking Day', text:`MooMoo baked ${a} chocolate chip cookies and ${b} oatmeal cookies for the farm fair.`, q:`How many cookies did MooMoo bake in total?` }),
    (a,b) => ({ scene:'🌟 Star Counting', text:`On a clear night, MooMoo counted ${a} stars on one side of the sky and ${b} stars on the other.`, q:`How many stars did MooMoo count in total?` }),
  ],
  '-': [
    (a,b) => ({ scene:'🥕 Carrot Garden', text:`MooMoo had ${a} carrots in her basket. She gave ${b} carrots to the friendly bunny next door.`, q:`How many carrots does MooMoo have left?` }),
    (a,b) => ({ scene:'🐦 Tree Branch', text:`There were ${a} birds singing on the old oak tree. Then ${b} birds flew away to find seeds.`, q:`How many birds are still on the tree?` }),
    (a,b) => ({ scene:'🎈 Balloon Party', text:`Farmer Billy had ${a} colorful balloons at the farm party. The wind blew ${b} of them away!`, q:`How many balloons does Farmer Billy still have?` }),
    (a,b) => ({ scene:'🍓 Berry Picking', text:`MooMoo picked ${a} strawberries. She ate ${b} of them because they were so yummy!`, q:`How many strawberries does MooMoo have now?` }),
    (a,b) => ({ scene:'🐝 Beehive', text:`The beehive had ${a} bees this morning. By afternoon, ${b} bees flew out to gather honey.`, q:`How many bees are still in the hive?` }),
  ],
  '×': [
    (a,b) => ({ scene:'🧺 Egg Baskets', text:`Farmer Billy has ${a} baskets. He carefully placed exactly ${b} eggs in each basket.`, q:`How many eggs are there in total?` }),
    (a,b) => ({ scene:'🌷 Flower Rows', text:`MooMoo planted ${a} rows of tulips. Each row has ${b} beautiful tulips.`, q:`How many tulips are in the garden altogether?` }),
    (a,b) => ({ scene:'🍬 Candy Bags', text:`At the farm fair, there are ${a} kids. Each kid gets ${b} pieces of candy as a prize.`, q:`How many pieces of candy are needed in total?` }),
    (a,b) => ({ scene:'🐾 Animal Legs', text:`MooMoo counted ${a} cows standing in the field. Every cow has ${b} legs.`, q:`How many legs are there altogether?` }),
    (a,b) => ({ scene:'📦 Supply Boxes', text:`Farmer Billy ordered ${a} boxes of hay. Each box contains ${b} bundles inside.`, q:`How many hay bundles are there in total?` }),
  ],
  '÷': [
    (a,b) => ({ scene:'🍕 Pizza Party', text:`MooMoo made ${a} pizza slices for her ${b} best friends. Everyone should get the same amount!`, q:`How many slices does each friend get?` }),
    (a,b) => ({ scene:'🌟 Sticker Sharing', text:`Farmer Billy has ${a} shiny stickers to share equally between ${b} notebooks.`, q:`How many stickers go in each notebook?` }),
    (a,b) => ({ scene:'🐣 Baby Chicks', text:`${a} baby chicks hatched on the farm! Farmer Billy puts them equally into ${b} cozy little boxes.`, q:`How many chicks are in each box?` }),
    (a,b) => ({ scene:'🍎 Fair Sharing', text:`MooMoo picked ${a} apples and wants to share them equally among ${b} animal friends.`, q:`How many apples does each friend receive?` }),
    (a,b) => ({ scene:'🎁 Gift Bags', text:`There are ${a} gifts to put into bags. Each bag holds ${b} gifts. Every bag should be full!`, q:`How many bags will Farmer Billy need?` }),
  ],
};

function getStory(op, a, b) {
  const pool = STORIES[op];
  return pool[Math.floor(Math.random() * pool.length)](a, b);
}

// ═══════════════════════════════════════════════
//  STEP-BY-STEP SOLUTIONS (7-year-old level)
// ═══════════════════════════════════════════════
function buildSteps(a, op, b, answer) {
  const steps = [];

  if (op === '+') {
    const big = Math.max(a,b), small = Math.min(a,b);
    steps.push(`We need to add ${a} and ${b} together.`);
    steps.push(`Start with the bigger number: ${big}.`);
    if (small <= 10) {
      const seq = [];
      for(let i=1;i<=small;i++) seq.push(big+i);
      steps.push(`Now count up ${small} more steps:`);
      steps.push(`${big} -> ${seq.join(' -> ')}`);
    } else {
      steps.push(`Split ${small} into two easy parts.`);
      const half = Math.floor(small/2);
      steps.push(`${big} + ${half} = ${big+half}, then + ${small-half} more = ${answer}`);
    }
    steps.push(`So ${a} + ${b} = ${answer}!`);

  } else if (op === '-') {
    steps.push(`We need to take ${b} away from ${a}.`);
    steps.push(`Imagine you have ${a} apples.`);
    if (b <= 10) {
      const seq = [];
      for(let i=1;i<=b;i++) seq.push(a-i);
      steps.push(`Count backwards ${b} steps:`);
      steps.push(`${a} -> ${seq.join(' -> ')}`);
    } else {
      const half = Math.floor(b/2);
      steps.push(`Take away ${half} first: ${a} - ${half} = ${a-half}`);
      steps.push(`Then take away ${b-half} more: ${a-half} - ${b-half} = ${answer}`);
    }
    steps.push(`So ${a} - ${b} = ${answer}!`);

  } else if (op === '×') {
    steps.push(`${a} x ${b} means "${a} groups of ${b}."`);
    steps.push(`Let's count up all the groups:`);
    let total = 0;
    const showAll = a <= 6;
    const shown = showAll ? a : 3;
    for(let i=1;i<=shown;i++) {
      total += b;
      steps.push(`Group ${i}: add ${b} more -> total so far = ${total}`);
    }
    if (!showAll) {
      steps.push(`... keep going, adding ${b} for each group ...`);
      steps.push(`All ${a} groups of ${b} add up to ${answer}`);
    }
    steps.push(`So ${a} x ${b} = ${answer}!`);

  } else {
    steps.push(`${a} / ${b} means: share ${a} things equally among ${b} friends.`);
    steps.push(`Give 1 thing to each friend, round by round:`);
    const rounds = answer;
    const show = Math.min(rounds, 4);
    for(let r=1;r<=show;r++) {
      steps.push(`Round ${r}: each friend gets 1 more (${r} each), ${a - r*b} left`);
    }
    if (rounds > show) steps.push(`... keep sharing until nothing is left ...`);
    steps.push(`After ${rounds} rounds, each friend ends up with ${answer}!`);
    steps.push(`So ${a} / ${b} = ${answer}!`);
  }
  return steps;
}

function renderSteps(steps) {
  const container = document.getElementById('steps-container');
  container.innerHTML = '';
  steps.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = (i === steps.length - 1) ? 'step-highlight' : 'step';
    el.textContent = s;
    container.appendChild(el);
  });
}

// ═══════════════════════════════════════════════
//  QUESTION GENERATION
// ═══════════════════════════════════════════════
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[rand(0,arr.length-1)]; }

const LIM = {
  easy:   {add:[1,10], sub:[5,15],  mul:[1,5],  div:[1,5]},
  medium: {add:[1,50], sub:[10,50], mul:[2,12], div:[2,9]},
  hard:   {add:[20,99],sub:[20,99], mul:[3,15], div:[2,12]},
};

function makeQ() {
  const ops = ['+','-','x','÷'];
  const op = pick(ops);
  const lim = LIM[G.diff];
  let a,b,ans;
  if(op==='+'){a=rand(...lim.add);b=rand(...lim.add);ans=a+b;}
  else if(op==='-'){a=rand(lim.sub[0]+5,lim.sub[1]);b=rand(1,a-1);ans=a-b;}
  else if(op==='x'){a=rand(...lim.mul);b=rand(...lim.mul);ans=a*b;}
  else{ans=rand(...lim.div);b=rand(2,lim.div[1]);a=ans*b;}
  const story = getStory(op==='x'?'×':op, a, b);
  const displayOp = op==='x'?'×':op;
  return {a,op,b,ans,story,display:`${a}  ${displayOp}  ${b}  =  ?`};
}

function genPage() {
  G.questions = Array.from({length:TOTAL}, makeQ);
  G.idx=0; G.pageWrong=0; G.pageLog=[];
  buildDots();
}

// ═══════════════════════════════════════════════
//  DOTS
// ═══════════════════════════════════════════════
function buildDots() {
  const w = document.getElementById('dots');
  w.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' current':'');
    d.id='dot'+i; w.appendChild(d);
  }
}
function refreshDots() {
  for(let i=0;i<TOTAL;i++){
    const d=document.getElementById('dot'+i);
    d.className='dot';
    if(i<G.idx) d.classList.add('done');
    else if(i===G.idx) d.classList.add('current');
  }
}

// ═══════════════════════════════════════════════
//  DISPLAY
// ═══════════════════════════════════════════════
function showQ() {
  if(G.idx >= TOTAL) return;
  const q = G.questions[G.idx];
  document.getElementById('storyScene').textContent = q.story.scene;
  document.getElementById('storyText').textContent  = q.story.text;
  document.getElementById('cardQuestion').textContent = q.story.q;
  document.getElementById('qtext').textContent = q.display;
  const inp = document.getElementById('ainput');
  inp.value=''; inp.className='ans-input';
  document.getElementById('fbk').textContent='';
  document.getElementById('fbk').className='feedback';
  document.getElementById('solution').classList.remove('show');
  G.attempts=0; G.busy=false;
  setTimeout(()=>inp.focus(),80);
}

// ═══════════════════════════════════════════════
//  ANSWER CHECK
// ═══════════════════════════════════════════════
function submit() {
  if(G.busy) return;
  const inp=document.getElementById('ainput');
  const val=inp.value.trim(); if(!val) return;
  const num=parseInt(val,10); if(isNaN(num)) return;
  num===G.questions[G.idx].ans ? onCorrect() : onWrong();
}

function onCorrect() {
  G.busy=true;
  const q=G.questions[G.idx];
  G.pageLog.push({display:q.display, ans:q.ans, wrongs:G.attempts});
  G.idx++; G.score++;
  document.getElementById('scoreNum').textContent=G.score;
  const inp=document.getElementById('ainput');
  inp.classList.add('flash-ok');
  const msgs=['Great job! 🌟','You got it! 🎉','Awesome! 💪','Perfect! ✅','Brilliant! 🌈','Wow, nice work! 🐄'];
  const fbk=document.getElementById('fbk');
  fbk.textContent=pick(msgs); fbk.className='feedback ok';
  const cow=document.getElementById('cow');
  cow.classList.add('happy'); setTimeout(()=>cow.classList.remove('happy'),600);
  burstStars(inp);
  moveCow(true);
  refreshDots();
  if(G.idx>=TOTAL){ setTimeout(finishPage,1050); }
  else { setTimeout(showQ,780); }
}

function onWrong() {
  G.attempts++; G.pageWrong++;
  const q=G.questions[G.idx];
  const inp=document.getElementById('ainput');
  inp.classList.add('flash-bad');
  setTimeout(()=>inp.classList.remove('flash-bad'),450);
  const cow=document.getElementById('cow');
  cow.classList.add('sad'); setTimeout(()=>cow.classList.remove('sad'),450);
  const fbk=document.getElementById('fbk');
  const msgs=["Not quite! Check the steps below 👇","Hmm, try again! Look at the hint below 🤔","Almost! The steps will help you 💪"];
  fbk.textContent=pick(msgs); fbk.className='feedback bad';
  // Show step-by-step solution
  const steps=buildSteps(q.a,q.op,q.b,q.ans);
  renderSteps(steps);
  document.getElementById('solution').classList.add('show');
  setTimeout(()=>{ inp.value=''; inp.focus(); },440);
}

function onKey(e){ if(e.key==='Enter') submit(); }

// ═══════════════════════════════════════════════
//  COW MOVEMENT
// ═══════════════════════════════════════════════
function moveCow(animate) {
  const cow=document.getElementById('cow');
  const prog=G.idx/TOTAL;
  const left=3+74*prog;
  cow.style.left=left+'%';
  if(animate && prog<1){
    cow.classList.add('walk');
    setTimeout(()=>cow.classList.remove('walk'),1000);
    spawnDust(left);
  }
}
function spawnDust(lp) {
  const g=document.querySelector('.ground');
  ['..','..'].forEach((ch,i)=>{
    const el=document.createElement('div');
    el.className='dust'; el.textContent='~';
    el.style.left=Math.max(0,lp-2+i)+'%';
    el.style.bottom=(50+rand(0,9))+'px';
    el.style.animationDelay=(i*.1)+'s';
    g.appendChild(el); setTimeout(()=>el.remove(),900);
  });
}

// ═══════════════════════════════════════════════
//  FINISH PAGE
// ═══════════════════════════════════════════════
function finishPage() {
  const cow=document.getElementById('cow');
  const hay=document.getElementById('hay');
  cow.style.transition='left .55s ease-in';
  cow.style.left='80%';
  cow.classList.add('walk');
  setTimeout(()=>{
    cow.classList.remove('walk');
    cow.classList.add('eating');
    hay.classList.add('eaten');
    playChime();
    setTimeout(()=>{ cow.classList.remove('eating'); celebrate(); },1100);
  },620);
}

function celebrate() {
  for(let i=0;i<65;i++) setTimeout(dropConfetti,i*32);
  const w=G.pageWrong;
  let emoji,title,stars,starsText;
  if(w===0){emoji='🏆';title='Perfect Score!';starsText='⭐⭐⭐⭐⭐';}
  else if(w<=3){emoji='🎉';title='Amazing Work!';starsText='⭐⭐⭐⭐';}
  else if(w<=7){emoji='😊';title='Great Job!';starsText='⭐⭐⭐';}
  else{emoji='💪';title='Keep Practicing!';starsText='⭐⭐';}
  document.getElementById('celEmoji').textContent=emoji;
  document.getElementById('celTitle').textContent=title;
  document.getElementById('celStars').textContent=starsText;
  document.getElementById('celDesc').textContent=`MooMoo reached the hay! 🌾\nAll 10 problems done. Hints used: ${w}`;
  document.getElementById('overlay').classList.add('show');
}

function dropConfetti() {
  const colors=['#5C9E31','#F4A528','#42A5F5','#EF5350','#AB47BC','#EC407A','#26C6DA'];
  const el=document.createElement('div');
  el.className='confetti';
  el.style.left=rand(0,98)+'vw';
  el.style.background=pick(colors);
  el.style.width=rand(8,15)+'px'; el.style.height=rand(8,15)+'px';
  el.style.borderRadius=Math.random()>.5?'50%':'3px';
  el.style.animationDuration=(1.4+Math.random()*2)+'s';
  document.body.appendChild(el); setTimeout(()=>el.remove(),3400);
}

// ═══════════════════════════════════════════════
//  STAR PARTICLES
// ═══════════════════════════════════════════════
function burstStars(el) {
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  ['*','*','*','*'].forEach((em,i)=>{
    const p=document.createElement('div');
    p.className='star-p'; p.textContent='✨';
    p.style.left=cx+'px'; p.style.top=cy+'px';
    p.style.setProperty('--dx',rand(-65,65)+'px');
    p.style.setProperty('--dy',rand(-85,-20)+'px');
    p.style.animationDelay=(i*.06)+'s';
    document.body.appendChild(p); setTimeout(()=>p.remove(),1000);
  });
}

// ═══════════════════════════════════════════════
//  SOUND
// ═══════════════════════════════════════════════
function playChime() {
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      const t=ctx.currentTime+i*.13;
      g.gain.setValueAtTime(.25,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.3);
      o.start(t);o.stop(t+.3);
    });
  }catch(e){}
}

// ═══════════════════════════════════════════════
//  PDF CERTIFICATE
// ═══════════════════════════════════════════════
function downloadPDF() {
  if(!window.jspdf){ alert('PDF library loading, please try again in a moment.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W=210;
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const w=G.pageWrong;
  const numStars=w===0?5:w<=3?4:w<=7?3:2;

  // Background
  doc.setFillColor(245,250,240); doc.rect(0,0,W,297,'F');
  // Outer border
  doc.setDrawColor(92,158,49); doc.setLineWidth(3); doc.rect(8,8,W-16,281);
  doc.setDrawColor(244,165,40); doc.setLineWidth(1); doc.rect(11,11,W-22,275);

  // Header bar
  doc.setFillColor(92,158,49); doc.rect(0,0,W,44,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(26); doc.setFont('helvetica','bold');
  doc.text('MoomooMath', W/2, 18, {align:'center'});
  doc.setFontSize(13); doc.setFont('helvetica','normal');
  doc.text('Daily Achievement Certificate', W/2, 30, {align:'center'});
  doc.setFontSize(16); doc.setTextColor(255,220,50);
  doc.text(Array(numStars).fill('*').join('  '), W/2, 40, {align:'center'});

  // Info block
  doc.setTextColor(40,40,40); doc.setFontSize(12);
  const infoY=58;
  const pairs=[
    ['Date:', today],
    ['Session:', `Page ${G.page}  |  Difficulty: ${G.diff.charAt(0).toUpperCase()+G.diff.slice(1)}`],
    ['Result:', `10 problems completed  |  ${w} hint${w!==1?'s':''} used  |  ${numStars} / 5 stars`],
  ];
  pairs.forEach(([label,val],i)=>{
    doc.setFont('helvetica','bold'); doc.text(label, 20, infoY+i*10);
    doc.setFont('helvetica','normal'); doc.text(val, 48, infoY+i*10);
  });

  // Divider
  doc.setDrawColor(92,158,49); doc.setLineWidth(.7); doc.line(20,infoY+32,W-20,infoY+32);

  // Problems table header
  doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(92,158,49);
  doc.text('Problems Solved Today', 20, infoY+42);

  // Problems list
  doc.setFontSize(10); let y=infoY+52;
  G.pageLog.forEach((item,i)=>{
    const clean=item.display.replace(/\?/,'').replace(/÷/,'/').replace(/×/,'x');
    const label=`${String(i+1).padStart(2,' ')}.  ${clean}= ${item.ans}`;
    const note=item.wrongs===0?'  (solved on first try!)':` (${item.wrongs} hint${item.wrongs>1?'s':''} used)`;
    doc.setFont('helvetica', item.wrongs===0?'bold':'normal');
    doc.setTextColor(item.wrongs===0?40:100, item.wrongs===0?100:100, 40);
    doc.text(label+note, 24, y); y+=8;
  });

  // Footer
  doc.setDrawColor(92,158,49); doc.setLineWidth(.5); doc.line(20,y+4,W-20,y+4);
  const footerMsgs=[
    'Perfect score - solved everything without a hint! Outstanding!',
    'Great effort with just a few hints needed. Well done!',
    'Good progress! Every problem you practice makes you stronger!',
    'Keep going! Every mistake is a chance to learn something new!'
  ];
  doc.setFontSize(12); doc.setFont('helvetica','bolditalic'); doc.setTextColor(230,101,0);
  doc.text(footerMsgs[numStars===5?0:numStars===4?1:numStars===3?2:3], W/2, y+16, {align:'center', maxWidth:170});
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(140,140,140);
  doc.text('MoomooMath -- Every problem solved is a step toward greatness!', W/2, y+28, {align:'center'});
  doc.text('Keep learning, keep growing!', W/2, y+35, {align:'center'});

  doc.save(`MoomooMath-Page${G.page}-${new Date().toISOString().slice(0,10)}.pdf`);
}

// ═══════════════════════════════════════════════
//  NEXT PAGE
// ═══════════════════════════════════════════════
function nextPage() {
  G.page++;
  document.getElementById('pageLabel').textContent=`Page ${G.page}`;
  document.getElementById('overlay').classList.remove('show');
  const cow=document.getElementById('cow');
  cow.style.transition='none'; cow.style.left='3%'; cow.style.fontSize='3.4em';
  const hay=document.getElementById('hay'); hay.className='hay';
  setTimeout(()=>{ cow.style.transition='left 1.1s cubic-bezier(.25,.46,.45,.94)'; genPage(); showQ(); },60);
}

// ═══════════════════════════════════════════════
//  DIFFICULTY
// ═══════════════════════════════════════════════
function setDiff(d) {
  G.diff=d;
  ['easy','medium','hard'].forEach(x=>document.getElementById('d-'+x).classList.toggle('active',x===d));
}

// ═══════════════════════════════════════════════
//  NUMPAD (touch)
// ═══════════════════════════════════════════════
function np(c){const i=document.getElementById('ainput'); if(String(i.value).length<5) i.value+=c;}
function npdel(){const i=document.getElementById('ainput'); i.value=String(i.value).slice(0,-1);}
function checkTouch(){
  if('ontouchstart' in window||navigator.maxTouchPoints>0){
    document.getElementById('numpad').style.display='grid';
    document.getElementById('ainput').readOnly=true;
  }
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init(){ checkTouch(); genPage(); showQ(); moveCow(false); }
init();
</script>
