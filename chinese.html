  // 地方 Places
  {char:"园",py:"yuán",en:"garden / park / yard",words:[["公园","gōng yuán","park"],["花园","huā yuán","garden"]],sent:["我们去公园玩！","Wǒmen qù gōngyuán wán!","Let's go to the park!"]},

  {char:"门",py:"mén",en:"door / gate",words:[["门口","mén kǒu","doorway"],["出门","chū mén","go out"]],sent:["请关门，谢谢！","Qǐng guān mén, xièxie!","Please close the door, thank you!"]},
  {char:"友",py:"yǒu",en:"friend",words:[["朋友","péng yǒu","friend"],["好友","hǎo yǒu","good friend"]],sent:["她是我最好的朋友。","Tā shì wǒ zuì hǎo de péngyǒu.","She is my best friend."]},
];

// ═══════════════════════════════════════════════════════════════════
// Ebbinghaus box intervals (days)
// ═══════════════════════════════════════════════════════════════════
const BOX_INTERVALS = [0, 1, 3, 7, 14, 30, 90]; // box 0=new, 6=mastered
const BATCH_SIZE = 5;

// ═══════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════
let currentUser = null;
let progress = {};        // { charIndex: { box, nextReview, correct, wrong } }
let streak = 0;
let totalStars = 0;
let lastDate = "";
let currentBatchStart = 0; // index of first char in current batch
let activeScreen = "home"; // home | learn | quiz | review

// ═══════════════════════════════════════════════════════════════════
// TTS — Web Speech API (zh-CN)
// ═══════════════════════════════════════════════════════════════════
let zhVoice = null;
function initVoices() {
  const voices = speechSynthesis.getVoices();
  zhVoice = voices.find(v => v.lang === 'zh-CN') ||
            voices.find(v => v.lang.startsWith('zh')) ||
            null;
}
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = initVoices;
  initVoices();
}

function speak(text, lang = 'zh-CN') {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  if (zhVoice && lang === 'zh-CN') utt.voice = zhVoice;
  utt.rate = 0.85;
  utt.pitch = 1.1;
  speechSynthesis.speak(utt);
}

// ═══════════════════════════════════════════════════════════════════
// FIREBASE PROGRESS
// ═══════════════════════════════════════════════════════════════════
async function loadProgress(uid) {
  const ref = doc(db, "users", uid, "data", "chinese");
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const d = snap.data();
    progress = d.progress || {};
    streak = d.streak || 0;
    totalStars = d.totalStars || 0;
    lastDate = d.lastDate || "";
    currentBatchStart = d.currentBatchStart || 0;
  }
}

async function saveProgress() {
  if (!currentUser) return;
  const ref = doc(db, "users", currentUser.uid, "data", "chinese");
  await setDoc(ref, { progress, streak, totalStars, lastDate, currentBatchStart }, { merge: true });
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function checkStreak() {
  const today = todayStr();
  if (lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (lastDate === yesterday) {
    streak++;
  } else if (lastDate !== today) {
    streak = 1;
  }
  lastDate = today;
}

// ═══════════════════════════════════════════════════════════════════
// EBBINGHAUS LOGIC
// ═══════════════════════════════════════════════════════════════════
function getCharProgress(idx) {
  return progress[idx] || { box: 0, nextReview: 0, correct: 0, wrong: 0 };
}

function isDueForReview(idx) {
  const p = getCharProgress(idx);
  if (p.box === 0) return false;
  if (p.box >= BOX_INTERVALS.length) return false; // mastered
  return Date.now() >= p.nextReview;
}

function markCorrect(idx) {
  const p = getCharProgress(idx);
  const newBox = Math.min(p.box + 1, BOX_INTERVALS.length - 1);
  const days = BOX_INTERVALS[newBox];
  progress[idx] = {
    box: newBox,
    nextReview: Date.now() + days * 86400000,
    correct: (p.correct || 0) + 1,
    wrong: p.wrong || 0,
  };
}

function markWrong(idx) {
  const p = getCharProgress(idx);
  progress[idx] = {
    box: 1,
    nextReview: Date.now() + 86400000,
    correct: p.correct || 0,
    wrong: (p.wrong || 0) + 1,
  };
}

function markLearned(idx) {
  // first time seeing a char
  if (!progress[idx] || progress[idx].box === 0) {
    progress[idx] = { box: 1, nextReview: Date.now() + 86400000, correct: 0, wrong: 0 };
  }
}

function getDueReviewChars() {
  return Object.keys(progress)
    .map(Number)
    .filter(idx => isDueForReview(idx))
    .slice(0, 10);
}

function getCurrentBatchChars() {
  const end = Math.min(currentBatchStart + BATCH_SIZE, CHARS.length);
  return Array.from({ length: end - currentBatchStart }, (_, i) => currentBatchStart + i);
}

function isBatchComplete() {
  return getCurrentBatchChars().every(idx => (progress[idx]?.box || 0) >= 1);
}

function unlockNextBatch() {
  currentBatchStart = Math.min(currentBatchStart + BATCH_SIZE, CHARS.length - BATCH_SIZE);
}

// ═══════════════════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════════════════
function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  activeScreen = id;
}

function renderHome() {
  // Streak
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('streakNum2').textContent = streak;
  document.getElementById('starsNum').textContent = totalStars;

  // Current batch chars
  const batchIdxs = getCurrentBatchChars();
  const batchEl = document.getElementById('batchGrid');
  batchEl.innerHTML = batchIdxs.map(idx => {
    const c = CHARS[idx];
    const p = getCharProgress(idx);
    const done = p.box >= 1;
    return `<div class="batch-char ${done ? 'done' : ''}" onclick="openLearnCard(${idx})">
      <div class="batch-hanzi">${c.char}</div>
      <div class="batch-py">${c.py}</div>
      ${done ? '<div class="batch-check">✓</div>' : ''}
    </div>`;
  }).join('');

  // Review due
  const due = getDueReviewChars();
  document.getElementById('reviewBadge').textContent = due.length > 0 ? due.length : '';
  document.getElementById('reviewBadge').style.display = due.length > 0 ? 'flex' : 'none';

  // Progress bar
  const totalLearned = Object.values(progress).filter(p => p.box >= 1).length;
  const pct = Math.round(totalLearned / CHARS.length * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${totalLearned} / ${CHARS.length} 个字`;

  // Batch complete — show unlock
  document.getElementById('unlockBtn').style.display = isBatchComplete() && currentBatchStart + BATCH_SIZE < CHARS.length ? 'block' : 'none';

  setScreen('screen-home');
}

// ─── LEARN CARD ───────────────────────────────────────────────────
let learnIdx = 0;
let learnQueue = [];
let learnQueuePos = 0;

function openLearnCard(idx) {
  learnIdx = idx;
  showLearnCard(idx);
  setScreen('screen-learn');
}

function openBatchLearn() {
  learnQueue = getCurrentBatchChars();
  learnQueuePos = 0;
  showLearnCard(learnQueue[0]);
  setScreen('screen-learn');
}

function showLearnCard(idx) {
  learnIdx = idx;
  const c = CHARS[idx];
  document.getElementById('lcChar').textContent = c.char;
  document.getElementById('lcPy').textContent = c.py;
  document.getElementById('lcEn').textContent = c.en;

  const wordsEl = document.getElementById('lcWords');
  wordsEl.innerHTML = c.words.map(([w, p, e]) =>
    `<div class="word-chip" onclick="speak('${w}')">
      <span class="word-hanzi">${w}</span>
      <span class="word-py">${p}</span>
      <span class="word-en">${e}</span>
      <span class="speak-btn">🔊</span>
    </div>`).join('');

  const s = c.sent;
  document.getElementById('lcSent').innerHTML =
    `<div class="sent-text" onclick="speak('${s[0]}')">${s[0]} 🔊</div>
     <div class="sent-py">${s[1]}</div>
     <div class="sent-en">${s[2]}</div>`;

  // progress in queue
  if (learnQueue.length > 0) {
    document.getElementById('lcProgress').textContent = `${learnQueuePos + 1} / ${learnQueue.length}`;
    document.getElementById('lcPrevBtn').style.display = learnQueuePos > 0 ? 'flex' : 'none';
    document.getElementById('lcNextBtn').textContent = learnQueuePos < learnQueue.length - 1 ? '下一个 →' : '去游戏 🐥';
  } else {
    document.getElementById('lcProgress').textContent = '';
    document.getElementById('lcPrevBtn').style.display = 'none';
    document.getElementById('lcNextBtn').textContent = '去游戏 🐥';
  }

  markLearned(idx);
  speak(c.char);
}

function lcNext() {
  if (learnQueue.length > 0 && learnQueuePos < learnQueue.length - 1) {
    learnQueuePos++;
    showLearnCard(learnQueue[learnQueuePos]);
  } else {
    // go to quiz
    startQuiz(learnQueue.length > 0 ? learnQueue : [learnIdx]);
  }
}

function lcPrev() {
  if (learnQueuePos > 0) {
    learnQueuePos--;
    showLearnCard(learnQueue[learnQueuePos]);
  }
}

// ─── QUIZ / GAME ───────────────────────────────────────────────────
let quizQueue = [];
let quizPos = 0;
let quizScore = 0;
let chickX = 0;

function startQuiz(idxs) {
  // shuffle quiz queue
  quizQueue = [...idxs].sort(() => Math.random() - 0.5);
  quizPos = 0;
  quizScore = 0;
  chickX = 0;
  document.getElementById('chickEmoji').style.left = '0%';
  document.getElementById('quizProgress').textContent = '';
  showQuizQuestion();
  setScreen('screen-quiz');
}

function startBatchQuiz() {
  const due = getDueReviewChars();
  const batch = getCurrentBatchChars();
  const pool = [...new Set([...due, ...batch])];
  if (pool.length === 0) { renderHome(); return; }
  startQuiz(pool);
}

function showQuizQuestion() {
  if (quizPos >= quizQueue.length) {
    showQuizEnd();
    return;
  }
  const idx = quizQueue[quizPos];
  const c = CHARS[idx];

  // Generate 3 wrong choices from other chars
  const allPy = CHARS.filter((_, i) => i !== idx).map(c => c.py);
  const wrongs = shuffle(allPy).slice(0, 3);
  const choices = shuffle([c.py, ...wrongs]);

  document.getElementById('quizChar').textContent = c.char;
  document.getElementById('quizProgress').textContent = `${quizPos + 1} / ${quizQueue.length}`;

  const choicesEl = document.getElementById('quizChoices');
  choicesEl.innerHTML = choices.map(py =>
    `<button class="choice-btn" onclick="checkAnswer(${idx}, '${py}', '${c.py}', this)">${py}</button>`
  ).join('');

  document.getElementById('quizFeedback').textContent = '';
  speak(c.char);
}

function checkAnswer(idx, chosen, correct, btn) {
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => b.disabled = true);

  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('quizFeedback').textContent = '太棒了！🎉';
    document.getElementById('quizFeedback').style.color = '#27ae60';
    markCorrect(idx);
    quizScore++;
    totalStars++;
    chickX = Math.min(chickX + (100 / quizQueue.length), 95);
    animateChick(true);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
    document.getElementById('quizFeedback').textContent = '再试试 💪';
    document.getElementById('quizFeedback').style.color = '#e74c3c';
    markWrong(idx);
    animateChick(false);
  }

  saveProgress();
  quizPos++;
  setTimeout(showQuizQuestion, 1400);
}

function animateChick(happy) {
  const chick = document.getElementById('chickEmoji');
  chick.style.left = chickX + '%';
  chick.classList.remove('chick-happy', 'chick-sad');
  chick.classList.add(happy ? 'chick-happy' : 'chick-sad');
  setTimeout(() => chick.classList.remove('chick-happy', 'chick-sad'), 600);
}

function showQuizEnd() {
  const total = quizQueue.length;
  const pct = Math.round(quizScore / total * 100);
  document.getElementById('quizChar').textContent = pct >= 80 ? '🎉' : '💪';
  document.getElementById('quizProgress').textContent = '';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizChoices').innerHTML = '';

  // Chick celebration
  document.getElementById('chickEmoji').style.left = '88%';
  document.getElementById('chickEmoji').classList.add('chick-celebrate');

  const msg = pct === 100 ? '全对！太厉害了！' :
              pct >= 80  ? `答对了 ${quizScore}/${total}，很棒！` :
                           `答对了 ${quizScore}/${total}，继续加油！`;

  const endEl = document.getElementById('quizEndMsg');
  endEl.innerHTML = `<div class="end-msg">
    <div class="end-score">${quizScore}/${total}</div>
    <div class="end-text">${msg}</div>
    <div class="end-stars">${'⭐'.repeat(Math.ceil(pct / 33.4))}</div>
    <button class="btn-primary" onclick="finishQuiz()">回主页</button>
  </div>`;

  speak(msg);
}

function finishQuiz() {
  document.getElementById('chickEmoji').classList.remove('chick-celebrate');
  document.getElementById('quizEndMsg').innerHTML = '';
  checkStreak();
  saveProgress();
  renderHome();
  setScreen('screen-home');
}

// ─── REVIEW ────────────────────────────────────────────────────────
function openReview() {
  const due = getDueReviewChars();
  if (due.length === 0) {
    alert('今天没有需要复习的字，继续学习新字吧！🐥');
    return;
  }
  startQuiz(due);
}

// ─── UTILS ─────────────────────────────────────────────────────────
function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

// ═══════════════════════════════════════════════════════════════════
// AUTH & INIT
// ═══════════════════════════════════════════════════════════════════
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
  currentUser = user;
  await loadProgress(user.uid);
  checkStreak();
  await saveProgress();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderHome();
});

window.doLogout = async () => {
  await signOut(auth);
  window.location.href = 'index.html';
};

// Expose functions to HTML onclick
window.openLearnCard     = openLearnCard;
window.openBatchLearn    = openBatchLearn;
window.lcNext            = lcNext;
window.lcPrev            = lcPrev;
window.startBatchQuiz    = startBatchQuiz;
window.openReview        = openReview;
window.checkAnswer       = checkAnswer;
window.finishQuiz        = finishQuiz;
window.speak             = speak;
window.renderHome        = () => { renderHome(); setScreen('screen-home'); };
window.unlockNext        = () => { unlockNextBatch(); saveProgress(); renderHome(); };
</script>

.nav-row{display:flex;gap:10px;}
.nav-btn{flex:1;background:var(--chick-dark);color:white;border:none;border-radius:12px;
  padding:14px;font-size:1em;font-weight:700;cursor:pointer;}
.nav-btn.secondary{background:white;color:var(--chick-dark);border:2px solid var(--chick-dark);}
.nav-btn:active{opacity:.85;}

/* ── QUIZ ── */
.chick-track{background:linear-gradient(135deg,#E8F5E9,#FFFDE7);border-radius:var(--radius);
  padding:16px;height:80px;position:relative;overflow:hidden;
  border:2px solid var(--chick);box-shadow:var(--shadow);}
.chick-ground{position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--chick-dark);border-radius:2px;}
.chick-flag{position:absolute;right:8px;bottom:3px;font-size:1.5em;}
#chickEmoji{position:absolute;bottom:4px;font-size:2em;transition:left .5s ease;left:0;}
.chick-happy{animation:chickHop .4s ease;}
.chick-sad{animation:chickShake .4s ease;}
.chick-celebrate{animation:chickDance 1s infinite;}
@keyframes chickHop{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes chickShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes chickDance{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-10px) rotate(-10deg)}75%{transform:translateY(-10px) rotate(10deg)}}

.quiz-char-box{background:var(--card);border-radius:var(--radius);padding:24px;
  text-align:center;box-shadow:var(--shadow);}
.quiz-char{font-size:5em;font-weight:700;line-height:1;}
.quiz-sub{font-size:.85em;color:var(--text2);margin-top:6px;}

.quiz-feedback{text-align:center;font-size:1.1em;font-weight:700;min-height:1.5em;
  transition:all .2s;}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.choice-btn{background:var(--card);border:2px solid var(--chick);border-radius:12px;
  padding:16px;font-size:1.1em;font-weight:700;cursor:pointer;transition:all .15s;
  color:var(--text);}
.choice-btn:disabled{cursor:default;}
.choice-btn.correct{background:var(--green);border-color:var(--green);color:white;}
.choice-btn.wrong{background:var(--red);border-color:var(--red);color:white;}
.choice-btn:not(:disabled):active{transform:scale(.96);}
.quiz-progress{text-align:center;font-size:.85em;color:var(--text2);}

#quizEndMsg .end-msg{text-align:center;display:flex;flex-direction:column;
  align-items:center;gap:16px;padding:16px;}
.end-score{font-size:3.5em;font-weight:900;color:var(--chick-dark);}
.end-text{font-size:1.1em;color:var(--text);}
.end-stars{font-size:2em;}

/* ── SCROLLBAR ── */
.screen::-webkit-scrollbar{width:4px;}
.screen::-webkit-scrollbar-thumb{background:var(--chick);border-radius:4px;}
</style>
</head>
<body>

<div id="loading">🐥<div style="font-size:.4em;color:#888">正在加载…</div></div>

<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">🐥 小鸡快跑</div>
    <div class="topbar-stats">
      <div class="stat-chip">🔥 <span id="streakNum">0</span>天</div>
      <div class="stat-chip">⭐ <span id="starsNum">0</span></div>
      <button class="topbar-home" onclick="window.location.href='index.html'" title="回主页">🏠</button>
      <button class="topbar-home" onclick="doLogout()" title="退出" style="font-size:1em">🚪</button>
    </div>
  </div>

  <!-- ══ HOME SCREEN ══ -->
  <div id="screen-home" class="screen">

    <!-- Progress -->
    <div class="section-card">
      <div class="streak-row">
        <div class="streak-icon">🔥</div>
        <div class="streak-info">
          <div class="streak-num" id="streakNum2"></div>
          <div class="streak-label">天连续打卡</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:.85em;color:#888">总进度</div>
          <div id="progressText" style="font-weight:700;color:#F9A825">0 / 90 个字</div>
        </div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    </div>

    <!-- Current batch -->
    <div class="section-card">
      <div class="section-title">今日五个字（点字可以点读）</div>
      <div class="batch-grid" id="batchGrid"></div>
      <button id="unlockBtn" class="btn-unlock" onclick="unlockNext()">🔓 解锁下五个新字！</button>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-primary" onclick="openBatchLearn()">📖 学这五个字</button>
      <button class="btn-secondary" onclick="openReview()">
        复习
        <span class="review-badge" id="reviewBadge">0</span>
      </button>
    </div>
    <button class="btn-primary" onclick="startBatchQuiz()">🐥 开始游戏！</button>

  </div>

  <!-- ══ LEARN SCREEN ══ -->
  <div id="screen-learn" class="screen">

    <div class="learn-header">
      <button class="back-btn" onclick="renderHome()">←</button>
      <span style="font-weight:700;font-size:1em">学习生字</span>
      <span class="lc-progress" id="lcProgress"></span>
    </div>

    <!-- Main character card -->
    <div class="char-card" onclick="speak(CHARS[learnIdx].char)">
      <div class="lc-hanzi" id="lcChar">字</div>
      <div class="lc-pinyin" id="lcPy">pīn yīn</div>
      <div class="lc-en" id="lcEn">meaning</div>
      <div class="lc-speak">🔊 点击听读音</div>
    </div>

    <!-- Words -->
    <div class="words-section">
      <div class="words-title">📝 组词</div>
      <div id="lcWords"></div>
    </div>

    <!-- Sentence -->
    <div class="sent-section">
      <div class="sent-title">✏️ 造句</div>
      <div id="lcSent"></div>
    </div>

    <!-- Nav buttons -->
    <div class="nav-row">
      <button class="nav-btn secondary" id="lcPrevBtn" onclick="lcPrev()" style="display:none">← 上一个</button>
      <button class="nav-btn" id="lcNextBtn" onclick="lcNext()">下一个 →</button>
    </div>
  </div>

  <!-- ══ QUIZ SCREEN ══ -->
  <div id="screen-quiz" class="screen">

    <!-- Chick track -->
    <div class="chick-track">
      <div id="chickEmoji">🐥</div>
      <div class="chick-flag">🏁</div>
      <div class="chick-ground"></div>
    </div>

    <!-- Question -->
    <div class="quiz-char-box">
      <div class="quiz-char" id="quizChar">字</div>
      <div class="quiz-sub">选择正确的拼音 🔊</div>
    </div>

    <div class="quiz-progress" id="quizProgress"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <div class="quiz-choices" id="quizChoices"></div>
    <div id="quizEndMsg"></div>

    <button class="back-btn" onclick="finishQuiz()" style="align-self:center;font-size:.9em;color:#888;padding:8px">退出游戏</button>
  </div>

</div>

</body>
</html>
